<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Chrome-style logo:
      - Three 120-degree colored sectors around the outside
      - Red top, green bottom-left, yellow bottom-right
      - Blue center circle with a white ring
      - Transparent background

    Geometry (math angles, 0=east, CCW positive; converted to SVG with y-flip):
      outer radius = 250, inner radius = 100, center = (256, 256)
      Red sector:    theta in [ 30,  150] (top)
      Green sector:  theta in [150,  270] (bottom-left, through 180/west)
      Yellow sector: theta in [-90,   30] (bottom-right, through 0/east)
      White ring outer radius = 100; blue center radius = 90
  -->

  <!-- Red sector (top) -->
  <path d="M 342.60 206 L 472.51 131 A 250 250 0 0 0 39.49 131 L 169.40 206 A 100 100 0 0 1 342.60 206 Z" fill="#EA4335"/>

  <!-- Yellow sector (bottom-right) -->
  <path d="M 256 356 L 256 506 A 250 250 0 0 0 472.51 131 L 342.60 206 A 100 100 0 0 1 256 356 Z" fill="#FBBC05"/>

  <!-- Green sector (bottom-left) -->
  <path d="M 169.40 206 L 39.49 131 A 250 250 0 0 0 256 506 L 256 356 A 100 100 0 0 1 169.40 206 Z" fill="#34A853"/>

  <!-- White ring (visible as 10px ring around the blue center) -->
  <circle cx="256" cy="256" r="100" fill="#FFFFFF"/>

  <!-- Blue center disc (~35% of icon diameter) -->
  <circle cx="256" cy="256" r="90" fill="#4285F4"/>

  <!-- Robot head overlay -->
  <g id="robot-head">
    <!-- Antenna stick + light -->
    <line x1="256" y1="96" x2="256" y2="39" stroke="#374151" stroke-width="13" stroke-linecap="round"/>
    <circle cx="256" cy="27" r="18" fill="#EF4444" stroke="#7F1D1D" stroke-width="4"/>

    <!-- Head body (rounded square) -->
    <rect x="96" y="96" width="320" height="320" rx="57" ry="57"
          fill="#E5E7EB" stroke="#374151" stroke-width="12"/>

    <!-- Eye sockets -->
    <circle cx="188" cy="234" r="42" fill="#111827"/>
    <circle cx="324" cy="234" r="42" fill="#111827"/>
    <!-- Glowing pupils -->
    <circle cx="188" cy="234" r="22" fill="#22D3EE"/>
    <circle cx="324" cy="234" r="22" fill="#22D3EE"/>
    <!-- Pupil highlights -->
    <circle cx="198" cy="224" r="9" fill="#FFFFFF"/>
    <circle cx="314" cy="224" r="9" fill="#FFFFFF"/>

    <!-- Smile -->
    <path d="M 182 320 Q 256 404 330 320" stroke="#374151" stroke-width="17"
          stroke-linecap="round" fill="none"/>
  </g>
</svg>
